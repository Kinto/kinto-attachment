name: Run CI checks

on: pull_request

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@v7

      - name: Run linting and formatting checks
        run: make lint

  unit-tests:
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      matrix:
        python-version: ["3.12", "3.13", "3.14"]
    services:
      postgres:
        image: postgres
        env:
          POSTGRES_PASSWORD: postgres
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    steps:
      - uses: actions/checkout@v6

      - name: Create database
        env:
          PGPASSWORD: postgres
        run: |
          psql -c "CREATE DATABASE testdb ENCODING 'UTF8' TEMPLATE template0;" -U postgres -h localhost

      - uses: astral-sh/setup-uv@v7
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: make install

      - name: Run unit tests
        run: make test

  functional-tests:
    runs-on: ubuntu-latest
    needs: lint
    services:
      postgres:
        image: postgres
        env:
          POSTGRES_PASSWORD: postgres
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    env:
      # We don't want to run `uv sync` to run implicitly on each `uv run` command
      # in the middle of the downgrade/migration part of the workflow.
      UV_NO_SYNC: 1
    steps:
      - uses: actions/checkout@v6

      - name: Create database
        env:
          PGPASSWORD: postgres
        run: |
          psql -c "CREATE DATABASE testdb ENCODING 'UTF8' TEMPLATE template0;" -U postgres -h localhost

      - uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: make install

      - name: Downgrade first to test migrations
        run: uv pip install "kinto-attachment<9"

      - name: Run kinto
        run: make run-kinto & sleep 5

      - name: Run functional tests
        run: make functional

      - name: Upgrade to local `kinto-attachment` version
        run: make install

      - name: Migrate and restart kinto
        run: |
          pkill -f "kinto start" || true
          pkill -f "http.server" || true
          make run-kinto & sleep 2

      - name: Post migration functional test
        run: |
          /usr/bin/openssl rand -base64 -out image4.png 3000
          uv run python scripts/upload.py \
            --server=http://localhost:8888/v1 \
            --bucket=services \
            --collection=logs \
            --auth=my-user:my-secret \
            image4.png
